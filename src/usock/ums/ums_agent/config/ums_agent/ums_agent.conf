[logging]
# log_level optional value: emerg, alert, crit, err, warning, notice, info, debug
log_level=info

# Authenticate x509 Options
# -------------------------------------------------------------------------------
# x509.truststore    : Path to trusted CA certificate store (verify peer certificate)
# x509.crl           : Path to Certificate Revocation List (optional, can be empty)
# x509.certificate   : Path to local certificate (present identity to peer)
# x509.private_key   : Path to local private key (for TLS signing, private key file should be encrypted)
# x509.prkey_pwd_desc: Private key decryption password from ums user's keyring (@u)
#                      IMPORTANT: Password must be stored in @u keyring before service starts
#                                 Methods: 1) keyctl manually, 2) ExecStartPre in ums_agent.service
# -------------------------------------------------------------------------------

[authenticate.client]
# Example:
# x509.truststore=/etc/ums_agent/certs/ca.crt
# x509.crl=/etc/ums_agent/certs/crl.pem
# x509.certificate=/etc/ums_agent/certs/client.crt
# x509.private_key=/etc/ums_agent/certs/client.key
# x509.prkey_pwd_desc=ums_agent_private_key_passphrase

[authenticate.server]
# Example:
# x509.truststore=/etc/ums_agent/certs/ca.crt
# x509.crl=/etc/ums_agent/certs/crl.pem
# x509.certificate=/etc/ums_agent/certs/server.crt
# x509.private_key=/etc/ums_agent/certs/server.key
# x509.prkey_pwd_desc=ums_agent_private_key_passphrase

[network]
# listen_port: TLS listen port for inter-node ums_agent communication
listen_port=61080
# listen_addr: TLS listen address (default 0.0.0.0 for all interfaces)
listen_addr=0.0.0.0
# max_conns: Maximum concurrent TLS connections (connection pool size), valid range: 1-65535
max_conns=1024

[tls]
# cipher_suite: TLS 1.3 cipher suite for secure channel
# Supported: TLS_AES_256_GCM_SHA384
cipher_suite=TLS_AES_256_GCM_SHA384
